name: "Docs"

permissions:
  contents: "read"
  pages: "write"
  id-token: "write"

on:
  push:
    branches:
      - "main"
  pull_request:
    paths:
      - "docs/**"
      - "**/README.md"
      - "CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out"
        uses: "actions/checkout@v6" # https://github.com/actions/checkout/releases
      - name: "GCP auth"
        uses: "google-github-actions/auth@v3" # https://github.com/google-github-actions/auth/releases
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
      - name: "Set up Hermit"
        uses: "cashapp/activate-hermit@v1" # https://github.com/cashapp/activate-hermit
        with:
          cache: "true"
      - name: "Set up Gradle"
        uses: "gradle/actions/setup-gradle@v5" # https://github.com/gradle/actions
      - name: "Generate Dokka API docs"
        run: |
          gradle dokkaGenerate
      - name: "Cache pnpm store"
        uses: "actions/cache@v4" # https://github.com/actions/cache
        with:
          path: "~/.local/share/pnpm/store/v10"
          key: "pnpm-store-${{ hashFiles('docs/pnpm-lock.yaml') }}"
          restore-keys: "pnpm-store-"
      - name: "Install dependencies"
        run: |
          pnpm install
        working-directory: "./docs"
      - name: "Build docs"
        run: |
          pnpm run build
        working-directory: "./docs"
      - name: "Upload artifact"
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: "actions/upload-pages-artifact@v3"
        with:
          path: "docs/dist"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: "build"
    runs-on: "ubuntu-latest"
    environment:
      name: "github-pages"
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: "Deploy to GitHub Pages"
        id: "deployment"
        uses: "actions/deploy-pages@v4"
